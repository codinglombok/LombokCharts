name: Feature request
description: Suggest a new mark, scale, or capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that isn't possible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: API sketch or behavior you'd like. Remember — no runtime dependencies.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
