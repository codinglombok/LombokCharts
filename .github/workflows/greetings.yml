name: Greetings

on: [pull_request_target, issues]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Thanks for opening your first issue in LombokCharts! A maintainer will take a look. If it's a bug, a minimal reproduction helps a lot."
          pr-message: "Thanks for your first pull request to LombokCharts! CI will run the tests and build; please make sure `npm test` passes locally."
