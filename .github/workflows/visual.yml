name: Visual

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      update:
        description: 'Regenerate snapshot baselines and commit them'
        type: boolean
        default: false

jobs:
  visual:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.56.0-noble
    steps:
      - uses: actions/checkout@v5
      - run: npm ci || npm install
      - run: npm run build
      - name: Run visual tests
        run: |
          if [ "${{ github.event.inputs.update }}" = "true" ]; then
            npx playwright test --update-snapshots
          else
            npx playwright test
          fi
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Commit regenerated baselines
        if: ${{ github.event.inputs.update == 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tests/visual/__snapshots__
          git commit -m "test: update visual baselines" || echo "no baseline changes"
          git push || echo "push skipped"
