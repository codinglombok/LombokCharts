name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so Claude can bisect regressions

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 20
            --allowedTools "Bash(npm ci),Bash(npm install),Bash(npm run build),Bash(npm run build:*),Bash(npm test),Bash(npm run test:*),Bash(npm run lint),Bash(npx *)"
            --system-prompt "You are working on a Lombok frontend library (LombokCSS or LombokCharts) consumed via jsDelivr CDN. Rules: (1) Never hand-edit files in dist/ — change src/ and run the npm build so dist is regenerated. (2) Preserve the public API and --lc-* token names; if a fix requires a breaking change, say so in the PR body and stop short of renaming without confirmation. (3) Vanilla JS/CSS only — do not introduce runtime dependencies. (4) After any fix, run the build and tests before pushing. (5) Keep bundle size in check; mention the size delta of dist output in the PR description."
