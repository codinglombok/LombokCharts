name: Keep dist fresh

# Rebuilds dist/ from source on every push to main and commits it if it changed,
# so the committed bundles (used by Composer/Packagist and the GitHub-based jsDelivr
# URL) always match src/ regardless of who built them. Pushes made with GITHUB_TOKEN
# do not trigger further workflow runs, so this cannot loop.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci || npm install
      - run: npm run build
      - name: Commit dist if it changed
        run: |
          if git diff --quiet -- dist; then
            echo "dist already matches source"
          else
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add dist
            git commit -m "build: regenerate dist [skip ci]"
            git push
          fi
