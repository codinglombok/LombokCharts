name: Claude Code Review (LombokCharts)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - "src/**"
      - "dist/**"
      - "examples/**"
      - "package.json"

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a PR for LombokCharts
            (codinglombok/LombokCharts), a dependency-free JavaScript
            charting library distributed as a UMD bundle via jsDelivr
            (dist/lombok-charts.umd.min.js). typically
            paired with LombokCSS and themed via `--lc-*` CSS variables.

            Review the diff with focus on:

            1. **Public API stability** — the entry point is the global
               `LombokCharts` (e.g. `LombokCharts.chart('#el', { mark:
               'donut', data: [...] })`). Any change to method names,
               option keys (mark, data, label/value shape), or default
               behavior is potentially BREAKING for CDN consumers who
               auto-update. Flag renames/removals loudly and note semver
               impact (patch / minor / MAJOR).
            2. **UMD bundle correctness** — the build must keep working
               as a plain <script> tag (window.LombokCharts) AND as a
               module import. No top-level features that break older
               evergreen browsers without transpilation; no accidental
               ESM-only syntax leaking into the UMD output.
            3. **dist/ vs src/ consistency** — dist must be rebuilt from
               src, never hand-edited. If one changed without the other,
               flag it.
            4. **Rendering correctness** — SVG/canvas math: division by
               zero with empty or single-datum datasets, NaN coordinates,
               negative values in donut/bar scales, label overflow,
               animation frames not cancelled on re-render or element
               removal (memory leaks on dashboard refresh).
            5. **Data handling** — user-supplied labels must be escaped
               before insertion into SVG/DOM (XSS via chart labels is a
               real risk when labels come from database content like
               asset names). Tolerate missing/extra keys gracefully.
            6. **Theming** — colors should resolve from `--lc-*` CSS
               variables with sane fallbacks, not hard-coded palettes
               that ignore the host theme.
            7. **Performance** — re-render cost on large datasets
               (SIMATRA charts can aggregate 80k+ asset records into
               series), unnecessary reflows, listeners on window/resize
               without debounce or cleanup.
            8. **Examples** — if behavior changed, examples/ should still
               reflect the current API.

            Post inline comments only on genuine issues. End with a short
            summary: ✅ approve, or ⚠️ blocking items, plus the semver
            classification of the change.
          claude_args: |
            --max-turns 15
