name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        run: npm ci || npm install
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Verify committed dist is up to date
        run: |
          git diff --exit-code -- dist || (echo "::error::dist/ is stale — run 'npm run build' and commit" && exit 1)
      - name: Report bundle size
        run: |
          echo "### Bundle sizes" >> "$GITHUB_STEP_SUMMARY"
          echo '| file | raw | gzip |' >> "$GITHUB_STEP_SUMMARY"
          echo '| --- | --- | --- |' >> "$GITHUB_STEP_SUMMARY"
          for f in dist/lombok-charts.esm.min.js dist/lombok-charts.umd.min.js; do
            raw=$(du -k "$f" | cut -f1)
            gz=$(gzip -c "$f" | wc -c | awk '{printf "%.1f", $1/1024}')
            echo "| $f | ${raw} KB | ${gz} KB |" >> "$GITHUB_STEP_SUMMARY"
          done
